plugins {
    id 'java'
    id 'maven-publish'
    id 'me.champeau.jmh' version '0.7.2'
    id 'com.gradleup.shadow' version '9.2.0'
//    id "com.vanniktech.maven.publish" version "0.36.0"
//    id 'signing'
}

group = 'dev.vfyjxf'
version = '1.1.4'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
    withSourcesJar()
}

// 主源码降级到 Java 8（供 JVM 8 消费方内联）；但测试源仍使用 Java 16+ 语法（record/switch 表达式等），
// 故测试的编译与运行单独固定到 Java 17 工具链：Java 17 既能编译现代语法，又能在 Java 8 字节码的主类上运行，
// 以此在不改写 40 个测试文件的前提下完整验证 Java 8 主源码的行为等价性。
tasks.named('compileTestJava') {
    javaCompiler = javaToolchains.compilerFor {
        languageVersion = JavaLanguageVersion.of(17)
    }
}
tasks.named('test') {
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

dependencies {
//    implementation 'org.jetbrains:annotations:25.0.0'
    implementation("it.unimi.dsi:fastutil:8.5.12")

    // Lombok：以 @Value/@Getter(fluent) 等消除 Java 8 降级（record→类）产生的 getter/equals/hashCode 样板。
    // 编译期注解处理器，产出纯 Java 8 字节码，不引入运行期依赖。
    compileOnly("org.projectlombok:lombok:1.18.34")
    annotationProcessor("org.projectlombok:lombok:1.18.34")


    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Gson for JSON parsing in tests
    testImplementation 'com.google.code.gson:gson:2.10.1'

    // JMH for benchmarking
    jmh 'org.openjdk.jmh:jmh-core:1.37'
    jmhAnnotationProcessor 'org.openjdk.jmh:jmh-generator-annprocess:1.37'
}

shadowJar {
    minimize()

    relocate 'it.unimi.dsi.fastutil', 'dev.vfyjxf.taffy.shadow.fastutil'
}

jmh {
    warmupIterations = 2
    iterations = 5
    fork = 1
    // Include all benchmark classes using full regex pattern
    includes = ['.*Benchmark.*']

    // Keep default runs reasonably fast.
    // Extended benchmarks are opt-in via the `jmhExtended` task below.
    excludes = ['.*ExtendedBenchmark.*']

    // JMH options
    jmhVersion = '1.37'
    resultFormat = 'JSON'
    resultsFile = project.file("${project.buildDir}/reports/jmh/results.json")

    // Increase stack size for deep recursion benchmarks (depth=1000)
    jvmArgs = ['-Xss16m']
}

test {
    useJUnitPlatform()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}



publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = project.group
            artifactId = 'taffy'
            version = project.version
            from components.java
        }
    }
    repositories {
        mavenLocal()
    }
}

